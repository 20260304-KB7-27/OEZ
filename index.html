<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>도라에몽 5초 퀴즈</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css"
    />
  </head>
  <body>
    <div id="startPage" class="page">
      <h1 class="main-title">5초 준다</h1>
      <div class="dora-speech">진구야 5초 안에 맞춰야 돼!!</div>
      <button type="button" id="startButton" class="pixel-btn">
        게임 시작
      </button>
    </div>

    <div id="gamePage" class="page hidden">
      <div id="timer">5</div>
      <div id="questionContainer">
        <h2 id="questionText">문제가 표시됩니다</h2>
      </div>

      <div id="world">
        <div id="doorLeft" class="door-wrapper">
          <div class="door-label" id="labelLeft"></div>
          <img src="/image/doorPixel.png" alt="문" />
        </div>
        <div id="doorRight" class="door-wrapper">
          <div class="door-label" id="labelRight"></div>
          <img src="/image/doorPixel.png" alt="문" />
        </div>

        <div id="player">
          <img src="/image/jingooPixel.png" alt="진구" />
        </div>
      </div>

      <div id="feedback" class="hidden">
        <img id="feedbackImg" src="" alt="피드백" />
      </div>
    </div>

    <div id="resultPage" class="page hidden">
      <div class="result-box">
        <h1 class="main-title" style="font-size: 60px">게임 종료</h1>
        <p id="finalScoreText"></p>
        <button
          type="button"
          id="retryButton"
          class="pixel-btn"
          style="position: static; transform: none"
        >
          다시 하기
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
